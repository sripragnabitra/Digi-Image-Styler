services:
  - type: web
    name: nst-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --preload
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app   # ← update after Vercel deploy
      - key: PYTHON_VERSION
        value: 3.10.0
